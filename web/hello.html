<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chính</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav ul li {
            margin-right: 20px;
        }
        .ranking {
            background-color: #f4f4f4;
            padding: 20px;
            width: 300px;
            margin-right: 20px;
        }
        .ranking h2 {
            margin-top: 0;
        }
        .song-list {
            margin-top: 20px;
        }
        .song-list li {
            padding: 10px 0;
            border-bottom: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Bài hát</a></li>
                <li><a href="#">Ca sĩ</a></li>
                <li><a href="#">Tác giả</a></li>
                <li><a href="#">Đăng nhập</a></li>
                <li><a href="#">Đăng ký</a></li>
            </ul>
        </nav>
        <div class="ranking">
            <h2>Bảng xếp hạng</h2>
            <ol>
                <li>Bài hát 1</li>
                <li>Bài hát 2</li>
                <li>Bài hát 3</li>
                <li>Bài hát 4</li>
                <li>Bài hát 5</li>
            </ol>
        </div>
    </header>
    <div class="song-list">
        <h2>Danh sách các bài hát</h2>
        <ul>
            <li>Bài hát 1</li>
            <li>Bài hát 2</li>
            <li>Bài hát 3</li>
            <li>Bài hát 4</li>
            <li>Bài hát 5</li>
            <li>Bài hát 6</li>
            <!-- Các bài hát khác -->
        </ul>
    </div>
</body>
</html>
